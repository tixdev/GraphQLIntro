supergraph:
  listen: 0.0.0.0:4000
  introspection: true
sandbox:
  enabled: true
cors:
  allow_any_origin: true
include_subgraph_errors:
  all: true
headers:
  all:
    request:
      - propagate:
          named: x-temporal-mode
      - propagate:
          named: x-temporal-range-start
      - propagate:
          named: x-temporal-range-end
